<header class="header">
  <div class="header-container">
    <a routerLink="/main" class="logo" aria-label="Velora home">
      <div class="logo-box">V</div>
      <div class="logo-text">
        <h2>Velora</h2>
        <p>Restaurant Management System</p>
      </div>
    </a>

    <nav class="nav">
      <a routerLink="/main" routerLinkActive="active-link" [routerLinkActiveOptions]="{ exact: true }">Overview</a>
      <a routerLink="/reservations" routerLinkActive="active-link">Reservations</a>
      <a routerLink="/menus" routerLinkActive="active-link">Menus</a>
      <a routerLink="/restaurant" routerLinkActive="active-link">Restaurant</a>
      @if (isAdmin$ | async) {
        <a routerLink="/users" routerLinkActive="active-link">Users</a>
      }
      @if (isLoggedIn$ | async) {
        <a routerLink="/profile" routerLinkActive="active-link">Profile</a>
      }
    </nav>

    <div class="actions">
      @if (isLoggedIn$ | async) {
        @if (profile$ | async; as profile) {
          <a routerLink="/profile" class="profile-chip">
            <img [src]="proxyService.getProfileAvatar(profile)" [alt]="proxyService.getDisplayName(profile)">
            <span>{{ profile.user?.username || 'Profile' }}</span>
          </a>
        }

        <button type="button" class="logout-btn" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" class="login-btn">Login</a>
        <a routerLink="/register" class="start-btn">Sign Up</a>
      }
    </div>
  </div>
</header>
